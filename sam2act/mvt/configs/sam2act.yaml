stage_two: True
norm_corr: True
rend_three_views: True
use_point_renderer: True
inp_pre_pro: False
inp_pre_con: False
feat_ver: 1
img_size: 224
img_patch_size: 14
cvx_up: True
xops: True
rot_ver: 1
st_wpt_loc_inp_no_noise: True
wpt_img_aug: 0.0
img_aug_2: 0.05
im_channels: 64
ifSAM2: True
lora_finetune: True
lora_r: 16
ifsep: False
resize_rgb: True
use_memory: False
sam2_config: /configs/sam2.1/sam2.1_hiera_b+
sam2_ckpt: ./mvt/sam2_train/checkpoints/sam2.1_hiera_base_plus.pt
num_maskmem: 9

# Stage1 multi-peak
use_multipeak: True
multipeak_targets_json: "data_memory/multipeak_targets/{task}_multipeak_both.json"

# Stage2 V10 candidate interface. Defaults keep the original top1/oracle crop.
stage2_candidate_mode: "top1"          # top1 | selector | kcrop
stage2_candidate_train_crop: "gt"      # gt | selector | nearest_gt
stage2_kcrop_train_pick: "target"      # target | selector
stage2_candidate_insert_gt_train: True

# V10c memory heatmap write policy.
stage2_memory_write_mode: "stage1"     # stage1 | topk_soft | weighted_topk | selected
stage2_memory_write_topk: 3
stage2_memory_write_temperature: 0.25
stage2_memory_write_sigma: 1.5
