stage_two: True
norm_corr: True
rend_three_views: True
use_point_renderer: True
inp_pre_pro: False
inp_pre_con: False
feat_ver: 1
img_size: 224
img_patch_size: 14
cvx_up: True
xops: True
rot_ver: 1
st_wpt_loc_inp_no_noise: True
wpt_img_aug: 0.0
img_aug_2: 0.05
im_channels: 64
ifSAM2: True
lora_finetune: True
lora_r: 16
ifsep: False
resize_rgb: True
use_memory: True
sam2_config: /configs/sam2.1/sam2.1_hiera_b+
sam2_ckpt: ./mvt/sam2_train/checkpoints/sam2.1_hiera_base_plus.pt
num_maskmem: 9

# Stage1 multi-peak labels for ambiguous keyframes
# NOTE: requires regenerating replay data (delete existing disk cache)
use_multipeak: False
# Options: "intra", "cross", "both"
#   intra: within-episode ambiguity only (KF4 vs KF7 etc.)
#   cross: cross-variation ambiguity only (same step, different variation targets)
#   both:  union of intra + cross
multipeak_mode: "both"
# Path to precomputed JSON. Use {task} placeholder for multi-task:
#   e.g. "data_memory/multipeak_targets/{task}_multipeak_both.json"
multipeak_targets_json: "data_memory/multipeak_targets/{task}_multipeak_both.json"

# Stage2 graph peak selector
use_graph_peak_select: False
