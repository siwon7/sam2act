# =============================================================================
# Idea 2: FiLM-Conditioned Keyframe Memory — Configuration
# =============================================================================
#
# This config controls the FiLM memory attention module that augments
# SAM2Act's existing memory cross-attention with language and phase conditioning.
#
# Integration: loaded by mvt_sam2_single.py alongside existing SAM2 config.
# The FiLM module does NOT replace SAM2 memory attention; it generates
# an additive attention bias injected via the memory_attn_mask argument.

# ---------------------------------------------------------------------------
# Module architecture
# ---------------------------------------------------------------------------
film_memory:
  enabled: true

  # Must match SAM2 memory attention d_model
  d_model: 256

  # Language embedding dimension (from CLIP or existing lang encoder)
  lang_dim: 128

  # Node embedding dimension (compact representation of task-graph position)
  node_dim: 64

  # Number of attention heads for FiLM bias generation
  # Should divide into SAM2's num_heads; use 1 for broadcast across all heads,
  # or match SAM2's num_heads (typically 8) for per-head control.
  num_heads: 1  # 1 = same bias for all SAM2 heads (simplest, recommended)

  # Phase predictor sub-module
  phase_predictor:
    num_layers: 2
    num_heads: 4
    max_history: 16    # max keyframes tracked per episode (MemoryBench max ~12)
    dropout: 0.1

  # FiLM bias generator sub-module
  film_bias_generator:
    hidden_dim: 128

# ---------------------------------------------------------------------------
# Training losses
# ---------------------------------------------------------------------------
losses:
  # Node contrastive loss (InfoNCE on node embeddings)
  node_contrastive:
    enabled: true
    weight: 0.1                  # lambda_contrastive
    position_threshold: 0.05     # 5cm — nodes closer than this are positives
    temperature: 0.1

  # Attention bias L2 regularization
  bias_regularization:
    enabled: true
    weight: 0.01                 # keeps bias as gentle modulation

  # Main heatmap loss (unchanged from baseline)
  heatmap:
    weight: 1.0                  # lambda_heatmap (same as baseline)

# ---------------------------------------------------------------------------
# Training schedule
# ---------------------------------------------------------------------------
training:
  # Stage1 weights are frozen; only FiLM module + SAM2 memory attention train
  freeze_stage1: true

  # Learning rate for FiLM module parameters
  lr: 1.0e-4
  weight_decay: 1.0e-5

  # Warmup for FiLM bias (start with zero bias, ramp up)
  bias_warmup_steps: 500

  # Gradient clipping
  max_grad_norm: 1.0

  # Epochs
  num_epochs: 50
  eval_every: 5

